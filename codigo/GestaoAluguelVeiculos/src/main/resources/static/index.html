<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Aluguel de Carros - Gestão Completa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚗 Gestão de Clientes e Rendimentos</h1>

  <form id="formCliente">
    <input type="hidden" id="id">
    
    <div class="section">
      <h3>Dados Pessoais</h3>
      <input type="text" id="nome" placeholder="Nome Completo" required>
      <input type="text" id="cpf" placeholder="CPF" required>
      <input type="text" id="rg" placeholder="RG">
      <input type="text" id="endereco" placeholder="Endereço">
      <input type="text" id="profissao" placeholder="Profissão">
    </div>

    <div class="section">
      <h3>Fontes de Rendimento (Máx 3)</h3>
      <div id="containerRendimentos">
        </div>
      <button type="button" id="btnAdicionarRenda" class="secondary">+ Adicionar Renda</button>
    </div>

    <button type="submit" class="primary">Salvar Cliente</button>
  </form>

  <h2>Lista de Clientes Cadastrados</h2>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>CPF</th>
        <th>Rendimentos</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaClientes"></tbody>
  </table>
</div>

<script src="js.js"></script>
</body>
</html>
