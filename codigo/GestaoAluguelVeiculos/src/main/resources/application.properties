# Nome da aplicação
micronaut.application.name=gestaoAluguelVeiculos

# Configuração do Banco de Dados MySQL
datasources.default.db-type=mysql
datasources.default.dialect=MYSQL
datasources.default.driver-class-name=com.mysql.cj.jdbc.Driver
datasources.default.url=jdbc:mysql://localhost:3306/aluguel_carros
datasources.default.username=root
datasources.default.password=1234

# JPA / Hibernate
# REMOVIDO: schema-generate=CREATE_DROP (para não apagar os dados ao reiniciar)
jpa.default.properties.hibernate.hbm2ddl.auto=update

# Configurações de CORS
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.default.allowed-origins=http://127.0.0.1:5500
micronaut.server.cors.configurations.default.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
micronaut.server.cors.configurations.default.allowed-headers=Content-Type,Accept,Origin