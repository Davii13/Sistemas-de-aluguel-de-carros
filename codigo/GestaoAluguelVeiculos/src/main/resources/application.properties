# Nome da aplicação
micronaut.application.name=gestaoAluguelVeiculos
micronaut.server.port=8081

# Configuração do Banco de Dados PostgreSQL
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=jdbc:postgresql://localhost:5432/aluguel_carros
datasources.default.username=postgres
datasources.default.password=1234

# JPA / Hibernate
jpa.default.properties.hibernate.hbm2ddl.auto=update

micronaut.server.cors.enabled=true

micronaut.server.cors.configurations.default.allowed-origins[0]=http://127.0.0.1:5500
micronaut.server.cors.configurations.default.allowed-origins[1]=http://localhost:5173
micronaut.server.cors.configurations.default.allowed-origins[2]=http://localhost:5174
micronaut.server.cors.configurations.default.allowed-origins[3]=http://localhost:5175

micronaut.server.cors.configurations.default.allowed-methods[0]=GET
micronaut.server.cors.configurations.default.allowed-methods[1]=POST
micronaut.server.cors.configurations.default.allowed-methods[2]=PUT
micronaut.server.cors.configurations.default.allowed-methods[3]=DELETE
micronaut.server.cors.configurations.default.allowed-methods[4]=OPTIONS

micronaut.server.cors.configurations.default.allowed-headers[0]=Content-Type
micronaut.server.cors.configurations.default.allowed-headers[1]=Authorization
micronaut.server.cors.configurations.default.allowed-headers[2]=Accept
micronaut.server.cors.configurations.default.allowed-headers[3]=Origin
