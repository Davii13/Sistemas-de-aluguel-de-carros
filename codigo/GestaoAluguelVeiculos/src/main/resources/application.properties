# Nome da aplicação
micronaut.application.name=gestaoAluguelVeiculos
micronaut.server.port=8081

# Configuração do Banco de Dados PostgreSQL
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=jdbc:postgresql://localhost:5432/aluguel_carros
datasources.default.username=postgres
datasources.default.password=1234

# JPA / Hibernate
jpa.default.properties.hibernate.hbm2ddl.auto=update
